<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login — Relatório Envios</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🔵</text></svg>" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" />
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}" />
</head>
<body class="login-body">

  <!-- Partículas decorativas de fundo -->
  <div class="login-bg">
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>
  </div>

  <div class="login-wrapper">
    <div class="login-card">

      <!-- Logo / Título -->
      <div class="login-header">
        <div class="login-icon">
          <i class="fa-solid fa-triangle-exclamation"></i>
        </div>
        <h1>Relatório Envios</h1>
        <p>Gestão de ocorrências de pedidos</p>
      </div>

      <!-- Flash messages -->
      {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
          {% for category, message in messages %}
          <div class="flash flash-{{ category }} flash-login">
            <i class="fa-solid {% if category == 'error' %}fa-xmark-circle{% else %}fa-info-circle{% endif %}"></i>
            {{ message }}
          </div>
          {% endfor %}
        {% endif %}
      {% endwith %}

      <!-- Formulário de Login -->
      <form class="login-form" id="login-form" method="POST" action="{{ url_for('auth.login') }}" novalidate>

        <div class="form-group">
          <label for="username">
            <i class="fa-solid fa-user"></i> Usuário
          </label>
          <input
            type="text"
            id="username"
            name="username"
            placeholder="Digite seu usuário"
            autocomplete="username"
            required
          />
        </div>

        <div class="form-group">
          <label for="password">
            <i class="fa-solid fa-lock"></i> Senha
          </label>
          <div class="input-password-wrapper">
            <input
              type="password"
              id="password"
              name="password"
              placeholder="Digite sua senha"
              autocomplete="current-password"
              required
            />
            <button type="button" class="toggle-password" onclick="togglePassword()">
              <i class="fa-solid fa-eye" id="eye-icon"></i>
            </button>
          </div>
        </div>

        <button type="submit" class="btn btn-primary btn-login" id="btn-login">
          <span class="btn-text">
            <i class="fa-solid fa-right-to-bracket"></i> Entrar
          </span>
          <span class="btn-loading" style="display:none;">
            <i class="fa-solid fa-spinner fa-spin"></i> Entrando...
          </span>
        </button>
      </form>

    </div>
  </div>

  <script src="{{ url_for('static', filename='js/login.js') }}"></script>
</body>
</html>
